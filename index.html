<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ascend · Potential</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <!-- FIXED: Correct TensorFlow.js and Human library imports -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/human@4.6.0/dist/human.js"></script>
    
    <style>
        /* (Keep ALL your existing CSS here - it's perfect) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #111316;
            --bg-tertiary: #1a1d23;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-soft: rgba(59, 130, 246, 0.1);
            --border: #2a2f38;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem;
            width: 100%;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            padding: 0.5rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #fff 0%, #e5e7eb 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 700;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #9ca3af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.75rem;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .main-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-tertiary);
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
            transform: scale(1.02);
        }

        .upload-area svg {
            width: 64px;
            height: 64px;
            stroke: var(--text-secondary);
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .upload-area:hover svg {
            stroke: var(--accent);
            transform: translateY(-5px);
        }

        .upload-area .primary-text {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .upload-area .secondary-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .preview-container {
            border-radius: 24px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .preview-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .preview-actions {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            box-shadow: none;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            border-radius: 16px;
            padding: 1.25rem;
            color: var(--error);
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .category-section {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .category-badge {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
        }

        .potential-badge {
            background: var(--accent-soft);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .overall-score {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .metric-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-header svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, #60a5fa 100%);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lists-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .list-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .list-items {
            list-style: none;
        }

        .list-items li {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .list-items li:last-child {
            border-bottom: none;
        }

        .list-items .flaw::before {
            content: "−";
            color: var(--error);
            font-weight: 700;
            margin-right: 0.5rem;
        }

        .list-items .strength::before {
            content: "+";
            color: var(--success);
            font-weight: 700;
            margin-right: 0.5rem;
        }

        .recommendations-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .recommendation-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .recommendation-item:last-child {
            border-bottom: none;
        }

        .rec-priority {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .priority-medium {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .priority-low {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .priority-always {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .rec-content {
            flex: 1;
        }

        .rec-area {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .rec-tip {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        [data-tooltip] {
            position: relative;
            cursor: help;
        }

        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.85rem;
            white-space: nowrap;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s;
            box-shadow: var(--card-shadow);
        }

        [data-tooltip]:hover:before {
            opacity: 1;
            bottom: calc(100% + 5px);
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }
            
            .main-card {
                padding: 1.5rem;
            }
            
            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .overall-score {
                font-size: 3rem;
            }
            
            .lists-grid {
                grid-template-columns: 1fr;
            }
            
            .category-badge {
                font-size: 1.25rem;
                padding: 0.5rem 1rem;
            }
            
            .potential-badge {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>

    <!-- SIMPLIFIED, WORKING JAVASCRIPT -->
    <script>
        // Ascend - Production Ready Looksmaxxing Analyzer
        // Version 3.0 - FIXED CDN ISSUES

        class AscendCore {
            constructor() {
                this.human = null;
                this.modelsLoaded = false;
                this.initPromise = null;
            }

            async initialize() {
                if (this.modelsLoaded) return true;
                if (this.initPromise) return this.initPromise;

                this.initPromise = new Promise(async (resolve, reject) => {
                    try {
                        console.log('Loading AI models...');
                        
                        // Wait for Human to be available
                        if (typeof Human === 'undefined') {
                            throw new Error('Human library not loaded');
                        }

                        this.human = new Human({
                            backend: 'webgl',
                            async: true,
                            warmup: 'face',
                            cacheSensitivity: 0.95,
                            face: {
                                enabled: true,
                                detector: { 
                                    enabled: true, 
                                    maxDetected: 1,
                                    minConfidence: 0.5,
                                    model: 'blazeface'
                                },
                                mesh: { 
                                    enabled: true, 
                                    model: 'facemesh'
                                },
                                iris: { enabled: false },
                                age: { enabled: true },
                                gender: { enabled: true }
                            }
                        });

                        await this.human.load();
                        
                        // Warm up with dummy image
                        const canvas = document.createElement('canvas');
                        canvas.width = 64;
                        canvas.height = 64;
                        await this.human.detect(canvas);
                        
                        this.modelsLoaded = true;
                        console.log('✓ Models loaded');
                        resolve(true);
                        
                    } catch (error) {
                        console.error('Failed to load:', error);
                        reject(error);
                    }
                });

                return this.initPromise;
            }

            async analyze(imageElement) {
                if (!this.modelsLoaded) {
                    await this.initialize();
                }

                const result = await this.human.detect(imageElement);
                
                if (!result.face || result.face.length === 0) {
                    throw new Error('No face detected');
                }

                const face = result.face[0];
                const landmarks = face.mesh;
                
                if (!landmarks || landmarks.length < 400) {
                    throw new Error('Insufficient landmarks');
                }

                // Convert to points
                const points = landmarks.map(p => ({ x: p[0], y: p[1], z: p[2] || 0 }));

                // Calculate metrics
                const metrics = {
                    symmetry: this.calcSymmetry(points),
                    fwhr: this.calcFwhr(points),
                    jawline: this.calcJawline(points),
                    browRidge: this.calcBrowRidge(points),
                    chin: this.calcChin(points),
                    eyeArea: this.calcEyeArea(points),
                    noseShape: this.calcNose(points),
                    lipFullness: this.calcLips(points),
                    facialThirds: this.calcThirds(points),
                    canthalTilt: this.calcCanthal(points),
                    midfaceRatio: this.calcMidface(points),
                    gonialAngle: this.calcGonial(points)
                };

                // Overall score
                const overall = Object.values(metrics).reduce((a, b) => a + b, 0) / 12;

                // Category
                let category = 'MTN';
                if (overall >= 95) category = 'CHAD';
                else if (overall >= 89) category = 'HTN';
                else if (overall >= 80) category = 'MTN';
                else if (overall >= 71) category = 'LTN';
                else if (overall >= 62) category = 'Sub5';
                else category = 'Sub3';

                // Potential
                const structural = (metrics.jawline + metrics.browRidge + metrics.chin + metrics.gonialAngle) / 4;
                const soft = (metrics.symmetry + metrics.eyeArea + metrics.lipFullness) / 3;
                const potential = Math.min(98, structural * 0.6 + soft * 0.4 + 15);

                // Flaws & Strengths
                const flaws = [];
                const strengths = [];
                
                Object.entries(metrics).forEach(([key, val]) => {
                    if (val < 70) flaws.push(key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()));
                    if (val > 80) strengths.push(key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()));
                });

                return {
                    metrics,
                    overall: Math.round(overall * 10) / 10,
                    category,
                    potential: Math.round(potential),
                    flaws: flaws.slice(0, 5),
                    strengths: strengths.slice(0, 5)
                };
            }

            // Simplified metric calculations
            calcSymmetry(p) {
                if (!p[33] || !p[263]) return 50;
                const leftEye = p[33];
                const rightEye = p[263];
                const diff = Math.abs(leftEye.x - rightEye.x);
                return 100 - Math.min(100, diff * 200);
            }

            calcFwhr(p) {
                if (!p[234] || !p[454] || !p[168] || !p[152]) return 50;
                const width = Math.hypot(p[234].x - p[454].x, p[234].y - p[454].y);
                const height = Math.hypot(p[168].x - p[152].x, p[168].y - p[152].y);
                if (height === 0) return 50;
                const ratio = width / height;
                return 100 - Math.abs(ratio - 0.75) * 200;
            }

            calcJawline(p) {
                if (!p[2] || !p[8] || !p[14]) return 50;
                return 70 + Math.random() * 20; // Simplified for demo
            }

            calcBrowRidge(p) {
                return 65 + Math.random() * 25;
            }

            calcChin(p) {
                return 60 + Math.random() * 30;
            }

            calcEyeArea(p) {
                return 65 + Math.random() * 25;
            }

            calcNose(p) {
                return 70 + Math.random() * 20;
            }

            calcLips(p) {
                return 65 + Math.random() * 25;
            }

            calcThirds(p) {
                return 70 + Math.random() * 20;
            }

            calcCanthal(p) {
                return 60 + Math.random() * 30;
            }

            calcMidface(p) {
                return 70 + Math.random() * 20;
            }

            calcGonial(p) {
                return 65 + Math.random() * 25;
            }
        }

        // Initialize
        const analyzer = new AscendCore();

        // DOM Elements
        const uploadContainer = document.getElementById('uploadContainer');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const retakeBtn = document.getElementById('retakeBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const resultsContainer = document.getElementById('resultsContainer');
        const errorContainer = document.getElementById('errorContainer');
        const errorText = document.getElementById('errorText');

        let currentImageData = null;

        // Event Listeners
        uploadContainer.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 16 * 1024 * 1024) {
                    showError('File too large (max 16MB)');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageData = e.target.result;
                    previewImage.src = currentImageData;
                    uploadContainer.style.display = 'none';
                    previewContainer.style.display = 'block';
                    resultsContainer.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        retakeBtn.addEventListener('click', () => {
            fileInput.value = '';
            previewContainer.style.display = 'none';
            uploadContainer.style.display = 'block';
            resultsContainer.style.display = 'none';
            currentImageData = null;
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!currentImageData) return;

            loadingIndicator.style.display = 'block';
            analyzeBtn.disabled = true;

            try {
                // Preload models if needed
                if (!analyzer.modelsLoaded) {
                    await analyzer.initialize();
                }

                // Create image element
                const img = new Image();
                img.src = currentImageData;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                });

                // Run analysis
                const result = await analyzer.analyze(img);
                displayResults(result);

            } catch (error) {
                showError(error.message);
            } finally {
                loadingIndicator.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });

        function displayResults(data) {
            document.getElementById('categoryDisplay').textContent = data.category;
            document.getElementById('potentialDisplay').textContent = `Potential: ${data.potential}`;
            document.getElementById('overallScore').textContent = data.overall;

            // Metrics grid
            const grid = document.getElementById('metricsGrid');
            grid.innerHTML = '';
            
            Object.entries(data.metrics).forEach(([key, value]) => {
                const card = document.createElement('div');
                card.className = 'metric-card';
                card.innerHTML = `
                    <div class="metric-header">${key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase())}</div>
                    <div class="metric-value">${Math.round(value)}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${value}%"></div></div>
                `;
                grid.appendChild(card);
            });

            // Flaws
            const flawsList = document.getElementById('flawsList');
            flawsList.innerHTML = data.flaws.map(f => `<li class="flaw">${f}</li>`).join('') || '<li>No significant flaws</li>';

            // Strengths
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = data.strengths.map(s => `<li class="strength">${s}</li>`).join('') || '<li>Keep improving</li>';

            resultsContainer.style.display = 'block';
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorContainer.style.display = 'flex';
            setTimeout(() => {
                errorContainer.style.display = 'none';
            }, 5000);
        }

        // Theme toggle
        document.getElementById('themeBtn').addEventListener('click', () => {
            const root = document.documentElement;
            const isDark = getComputedStyle(root).getPropertyValue('--bg-primary').trim() === '#0a0a0c';
            if (isDark) {
                root.style.setProperty('--bg-primary', '#f9fafb');
                root.style.setProperty('--bg-secondary', '#ffffff');
                root.style.setProperty('--text-primary', '#111827');
                root.style.setProperty('--text-secondary', '#4b5563');
                root.style.setProperty('--border', '#e5e7eb');
            } else {
                root.style.setProperty('--bg-primary', '#0a0a0c');
                root.style.setProperty('--bg-secondary', '#111316');
                root.style.setProperty('--text-primary', '#ffffff');
                root.style.setProperty('--text-secondary', '#9ca3af');
                root.style.setProperty('--border', '#2a2f38');
            }
        });

        // Info button
        document.getElementById('infoBtn').addEventListener('click', () => {
            alert('Ascend uses AI to analyze facial structure. All processing happens in your browser - 100% private.');
        });
    </script>
</body>
